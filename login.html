<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="navstyle.css">
</head>
<style>
    *{
        margin: 0;
        padding: 0;
    }

    .contianer{
        min-height: 100vh;
        width: 100%;
        display: flex;
        justify-content: center;
        align-items: center;
        background-image: url('images/first.jpg');
        background-attachment: fixed;
        background-repeat: no-repeat;
        background-size:100%;
        
    }
    .content{
        /* background-image: url('images/logo.png'); */
        /* background-color: lightgrey;     */
        width: 450px;
        height: 400px;
        backdrop-filter:blur(10px);
        text-align: center;
        
    }
    h1{
        font-size: 23px;
        text-align: center;
    }
    .input-box{
        width: 99%;
        height: 50px;
        /* background: sienna; */
        margin: 25px 0;

    }
    .input-box input{
        width: 100%;
        height: 100%;
        background: transparent;
        border: none;
        outline: none;
        border: 2px solid rgba(255, 255, 255, .2);
        border-radius: 40px;
        font-size: 16px;
        color: #fff;
        /* padding: 20px 45px 20px 20px; */
    }
    .input-box input::placeholder{
        color: #fff;
    }
    .input-box i{
        position: absolute;
        right: 20px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 20px;
    }
    .remember{
        display: flex;
        justify-content: space-between;
        font-size: 14px;
        margin: -15px 0 15px;
    }
    .remember label input{
        accent-color: #fff;
        margin-right: 3px;
    }
    .remember label a{
        accent-color: #fff;
        text-decoration: none;
        /* margin-right: 3px; */
    }
    .remember label a:hover{
        text-decoration: underline;
    }
    .remember .btn{
        width: 100%;
        height: 45px;
    background: #fff;
    border: none;
    outline: none;
    border-radius: 40px;
        box-shadow: 0 0 10px rgba(0, 0, 0, .1);
        cursor: pointer;
        font-size: 16px;
        color: #333;
        font-weight: 600;
    }



  
</style>
<body>
    
    <div class="contianer">
        <div class="content">
            <h1>Login </h1>
            <hr>
            <div class="form">
                <form action="" method="post" id="login_form">
                    <div class="input-box">
                        <input type="text" name="user_name" id="user_name">
                        <i class="fa fa-user"></i>
                    </div>
                    <div class="input-box">
                        <input type="text" name="password" id="password">
                        <i class="fa fa-lock"></i>
                    </div>
                    <div class="remember">
                        <label for=""><input type="checkbox" name="remember" id=""></label>
                        <a href="#">forget password</a>
                    </div>
                    <button type="submit" class="btn"> Login</button>
                    <div class="register-link">
                        <p>Don't have an acount?
                        <a href="#">Register</a></p>
                    </div>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
